name: CD

# Runs after CI passes on main, or can be triggered manually.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            set -e
            cd /home/ubuntu/cloud-erp

            echo ">>> Pulling latest code..."
            git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/Xabibullo01/cloud-erp.git
            git fetch origin main
            git reset --hard origin/main

            echo ">>> Rebuilding and restarting containers..."
            docker compose down
            docker compose up --build -d

            echo ">>> Waiting for app to start..."
            sleep 20

            echo ">>> Running migrations..."
            docker compose exec -T web python manage.py migrate --noinput

            echo ">>> Collecting static files..."
            docker compose exec -T web python manage.py collectstatic --noinput

            echo ">>> Health check..."
            curl -f --retry 5 --retry-delay 5 http://localhost:8000/health/ \
              && echo "Deploy successful!" \
              || (echo "Health check FAILED" && exit 1)
